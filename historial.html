<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Presupuestos — ALZU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--rojo:#CC0000;--negro:#1a1a1a;--gris:#f5f5f5;--borde:#ddd}
  body{background:#e8e8e8;font-family:'Barlow',sans-serif;color:var(--negro);padding:20px}
  .controles{max-width:900px;margin:0 auto 14px;display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap}
  .btn{padding:9px 20px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;border-radius:3px;transition:all .15s}
  .btn-rojo{background:var(--rojo);color:#fff}.btn-rojo:hover{background:#aa0000}
  .btn-gris{background:#555;color:#fff}.btn-gris:hover{background:#333}
  .titulo{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;color:var(--rojo);letter-spacing:1px}
  .sheet{max-width:900px;margin:0 auto;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.18);padding:24px 28px}
  .estado{padding:40px 0;text-align:center;color:#888;font-size:15px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{background:var(--rojo);color:#fff;padding:10px 12px;font-weight:700;letter-spacing:.3px;font-size:12px;text-align:left}
  thead th:last-child{text-align:center;width:150px}
  tbody td{padding:10px 12px;border-bottom:1px solid #eee;vertical-align:middle}
  tbody tr:nth-child(even){background:#fafafa}
  tbody tr:hover{background:#fff3f3}
  .nombre-cell{font-weight:700;color:var(--negro)}
  .sub{display:block;font-size:11px;color:#999;font-weight:400;margin-top:2px}
  .total-cell{font-weight:700;color:var(--rojo);white-space:nowrap}
  .acciones{display:flex;gap:6px;justify-content:center}
  .mini{padding:5px 10px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:700;font-size:11px;border-radius:3px}
  .mini-ver{background:#1a6fb5;color:#fff}.mini-ver:hover{background:#155a94}
  .mini-del{background:#eee;color:#999}.mini-del:hover{background:#CC0000;color:#fff}
  .detalle{background:#f9f9f9;border-left:4px solid var(--rojo);padding:14px 18px;font-size:13px}
  .detalle h4{color:var(--rojo);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .detalle table{font-size:12.5px;margin-top:6px}
  .detalle thead th{background:#555;padding:6px 8px}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="controles">
  <div class="titulo">HISTORIAL</div>
  <button class="btn btn-rojo" onclick="window.location.href='index.html'">＋ Nuevo presupuesto</button>
</div>

<div class="sheet">
  <div id="estado" class="estado">Cargando presupuestos…</div>
  <table id="tabla" style="display:none">
    <thead>
      <tr>
        <th>Nombre / Cliente</th>
        <th>Fecha</th>
        <th>Total Neto</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  var db;

  var firebaseConfig = {
    apiKey: "AIzaSyDQNKm3jwmP3r59eDzIbG3tIulZkm1qtNQ",
    authDomain: "alzupresupuestos.firebaseapp.com",
    databaseURL: "https://alzupresupuestos-default-rtdb.firebaseio.com",
    projectId: "alzupresupuestos",
    storageBucket: "alzupresupuestos.firebasestorage.app",
    messagingSenderId: "340768090431",
    appId: "1:340768090431:web:dc208c4f22393326ae8b8a"
  };

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function showToast(msg, color) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#222';
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  window.addEventListener('load', function() {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    cargarPresupuestos();
  });

  function cargarPresupuestos() {
    db.ref('presupuestos').on('value', function(snapshot) {
      var estado = document.getElementById('estado');
      var tabla = document.getElementById('tabla');
      var tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      var val = snapshot.val();
      if (!val) {
        tabla.style.display = 'none';
        estado.style.display = 'block';
        estado.textContent = 'Todavía no hay presupuestos guardados.';
        return;
      }

      // Convertir a array y ordenar por más reciente
      var lista = Object.keys(val).map(function(key) {
        var p = val[key]; p._key = key; return p;
      }).reverse();

      lista.forEach(function(p) {
        var nombre = p.nombre || (p.cliente + ' - ' + p.nro) || 'Sin nombre';
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="nombre-cell">' + escapeHtml(nombre) +
            '<span class="sub">Nro. ' + escapeHtml(p.nro || '-') + ' · ' + escapeHtml(p.cliente || '') + '</span></td>' +
          '<td>' + escapeHtml(p.fecha || '-') +
            '<span class="sub">Guardado: ' + escapeHtml(p.guardadoEn || '-') + '</span></td>' +
          '<td class="total-cell">' + escapeHtml(p.totalNeto || '$ 0,00') + '</td>' +
          '<td><div class="acciones">' +
            '<button class="mini mini-ver">Ver</button>' +
            '<button class="mini mini-del">Eliminar</button>' +
          '</div></td>';

        var trDetalle = document.createElement('tr');
        trDetalle.style.display = 'none';
        var tdDetalle = document.createElement('td');
        tdDetalle.colSpan = 4;
        tdDetalle.innerHTML = construirDetalle(p);
        trDetalle.appendChild(tdDetalle);

        tr.querySelector('.mini-ver').addEventListener('click', function() {
          trDetalle.style.display = (trDetalle.style.display === 'none') ? '' : 'none';
        });
        tr.querySelector('.mini-del').addEventListener('click', function() {
          if (confirm('¿Eliminar el presupuesto "' + nombre + '"?')) {
            db.ref('presupuestos/' + p._key).remove()
              .then(function() { showToast('🗑 Presupuesto eliminado','#555'); })
              .catch(function() { showToast('❌ No se pudo eliminar','#CC0000'); });
          }
        });

        tbody.appendChild(tr);
        tbody.appendChild(trDetalle);
      });

      estado.style.display = 'none';
      tabla.style.display = 'table';
    }, function(error) {
      var estado = document.getElementById('estado');
      estado.style.display = 'block';
      estado.textContent = 'Error al leer la base de datos: ' + error.message;
    });
  }

  function construirDetalle(p) {
    var filas = '';
    (p.items || []).forEach(function(it) {
      if (!it.desc && !it.total) return;
      filas +=
        '<tr><td>' + escapeHtml(it.desc) + '</td><td>' + escapeHtml(it.cant) +
        '</td><td>' + escapeHtml(it.destinatario) + '</td><td>' + escapeHtml(it.remito) +
        '</td><td>' + escapeHtml(it.total) + '</td></tr>';
    });
    if (!filas) filas = '<tr><td colspan="5" style="color:#999">Sin ítems</td></tr>';

    return '<div class="detalle">' +
      '<h4>Detalle del presupuesto</h4>' +
      '<div><strong>Contacto:</strong> ' + escapeHtml(p.contacto || '-') +
      ' &nbsp;·&nbsp; <strong>Campaña:</strong> ' + escapeHtml(p.campana || '-') + '</div>' +
      '<table><thead><tr><th>Descripción</th><th>Cant.</th><th>Destinatario</th><th>N° Remito</th><th>Total</th></tr></thead>' +
      '<tbody>' + filas + '</tbody></table>' +
      '<div style="margin-top:10px">' +
        '<strong>Subtotal:</strong> ' + escapeHtml(p.subtotal || '-') +
        ' &nbsp;·&nbsp; <strong>Coordinación:</strong> ' + escapeHtml(p.coordinacion || '-') +
        ' &nbsp;·&nbsp; <strong>Total Neto:</strong> ' + escapeHtml(p.totalNeto || '-') +
      '</div>' +
      '<div style="margin-top:6px;color:#666">' +
        '<strong>Pago:</strong> ' + escapeHtml(p.pago || '-') +
        ' &nbsp;·&nbsp; <strong>Validez:</strong> ' + escapeHtml(p.validez || '-') +
      '</div>' +
    '</div>';
  }
</script>
</body>
</html>
